apiVersion: v2
name: demoapp
description: A Helm chart for DemoApp - Demo Application with Swagger for Test Case Generation
type: application

# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 0.1.0

# This is the version number of the application being deployed. This version number should be
# incremented each time you make changes to the application. Versions are not expected to
# follow Semantic Versioning. They should reflect the version the application is using.
# It is recommended to use it with quotes.
appVersion: "0.1.0"

# Keywords for easier discovery
keywords:
  - demoapp
  - nodejs
  - swagger
  - api
  - testing

# Maintainers information
maintainers:
  - name: DevOps Team
    email: devops@example.com
    url: https://github.com/your-org

# Home and source URLs
home: https://github.com/your-org/a2a
sources:
  - https://github.com/your-org/a2a

# Icon URL (optional)
# icon: https://example.com/icon.png

# Application annotations
annotations:
  category: Application
